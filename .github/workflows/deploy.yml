name: Deploy DONNA to Cloud Run

on:
  push:
    branches:
      - main   # auto-deploy on every push to main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # needed for Workload Identity auth with GCP

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Authenticate to Google Cloud
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # 3. Set up gcloud CLI
      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # 4. Build the React frontend
      - name: Install dependencies & build frontend
        run: |
          npm ci
          npm run build

      # 5. Deploy to Cloud Run (builds Docker image in GCP, deploys instantly)
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: donna
          region: asia-south1
          source: .
          flags: --allow-unauthenticated --memory=512Mi --cpu=1
          env_vars: |
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
